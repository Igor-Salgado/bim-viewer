<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIM 4D Viewer — Filtragem de Rejeito</title>
<link rel="stylesheet" href="https://developer.api.autodesk.com/modelderivative/v2/viewers/7.*/style.css"/>
<script src="https://developer.api.autodesk.com/modelderivative/v2/viewers/7.*/viewer3D.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: #e6edf3; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  #header { background: #161b22; border-bottom: 1px solid #30363d; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; height: 48px; }
  #header-left { display: flex; align-items: center; gap: 12px; }
  #header-logo { width: 26px; height: 26px; background: #1f6feb; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0; }
  #header-title { font-size: 13px; font-weight: 600; color: #e6edf3; }
  #header-sub { font-size: 11px; color: #7d8590; }
  #status-badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; background: #1f6feb22; border: 1px solid #1f6feb55; color: #58a6ff; font-weight: 500; }
  #viewer-container { flex: 1; position: relative; overflow: hidden; }
  #forgeViewer { width: 100%; height: 100%; }
  #login-screen { position: absolute; inset: 0; background: #0d1117; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px; z-index: 200; }
  #login-screen.hidden { display: none; }
  .login-card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 40px 48px; display: flex; flex-direction: column; align-items: center; gap: 20px; max-width: 360px; width: 90%; }
  .login-logo { width: 48px; height: 48px; background: #1f6feb; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 700; color: #fff; }
  .login-title { font-size: 18px; font-weight: 600; color: #e6edf3; text-align: center; }
  .login-sub { font-size: 13px; color: #7d8590; text-align: center; line-height: 1.6; }
  #login-btn { width: 100%; padding: 11px 0; background: #1f6feb; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  #login-btn:hover { background: #388bfd; }
  #loading-overlay { position: absolute; inset: 0; background: #0d1117; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 20px; z-index: 100; transition: opacity 0.5s ease; }
  #loading-overlay.visible { display: flex; }
  #loading-overlay.fade { opacity: 0; pointer-events: none; }
  .spinner { width: 40px; height: 40px; border: 3px solid #30363d; border-top-color: #1f6feb; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading-text { font-size: 13px; color: #7d8590; letter-spacing: 0.04em; }
  #error-overlay { position: absolute; inset: 0; background: #0d1117; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 16px; z-index: 100; padding: 40px; text-align: center; }
  #error-overlay.visible { display: flex; }
  #error-title { font-size: 16px; font-weight: 600; color: #f85149; }
  #error-msg { font-size: 13px; color: #7d8590; max-width: 400px; line-height: 1.6; }
  #retry-btn { padding: 8px 20px; background: #1f6feb; color: #fff; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; font-weight: 500; }
  #retry-btn:hover { background: #388bfd; }
</style>
</head>
<body>
<div id="header">
  <div id="header-left">
    <div id="header-logo">B</div>
    <div>
      <div id="header-title">1111_GERAL_BIM 4D — One Page Report</div>
      <div id="header-sub">Filtragem de Rejeito · Navisworks Viewer</div>
    </div>
  </div>
  <div id="status-badge">ao vivo</div>
</div>
<div id="viewer-container">
  <div id="forgeViewer"></div>
  <div id="login-screen">
    <div class="login-card">
      <div class="login-logo">B</div>
      <div class="login-title">BIM 4D Viewer</div>
      <div class="login-sub">Faça login com sua conta Autodesk para visualizar o modelo Navisworks do projeto Filtragem de Rejeito.</div>
      <button id="login-btn" onclick="doLogin()">Entrar com Autodesk</button>
    </div>
  </div>
  <div id="loading-overlay">
    <div class="spinner"></div>
    <div id="loading-text">Carregando modelo BIM...</div>
  </div>
  <div id="error-overlay">
    <div id="error-title">Erro ao carregar o modelo</div>
    <div id="error-msg"></div>
    <button id="retry-btn" onclick="location.reload()">Tentar novamente</button>
  </div>
</div>
<script>
  const CLIENT_ID    = 'OrLSNQJT3ZaW2PGbfXXRTsEqSLJm2fIz9IM9VeGn5Wmw115C';
  const CALLBACK     = 'https://igor-salgado.github.io/bim-viewer/callback.html';
  const SCOPE        = 'data:read viewables:read';
  const ITEM_URN_B64 = btoa('urn:adsk.wipprod:dm.lineage:MfpJ0SrvQWGJzuWe3gMGFw').replace(/=/g,'');

  const loginScreen    = document.getElementById('login-screen');
  const loadingOverlay = document.getElementById('loading-overlay');
  const loadingText    = document.getElementById('loading-text');
  const errorOverlay   = document.getElementById('error-overlay');
  const errorMsg       = document.getElementById('error-msg');

  function showError(msg) {
    loadingOverlay.classList.remove('visible');
    errorOverlay.classList.add('visible');
    errorMsg.textContent = msg;
  }

  function doLogin() {
    const url = `https://developer.api.autodesk.com/authentication/v2/authorize`
      + `?response_type=code`
      + `&client_id=${CLIENT_ID}`
      + `&redirect_uri=${encodeURIComponent(CALLBACK)}`
      + `&scope=${encodeURIComponent(SCOPE)}`;
    window.open(url, 'autodesk_login', 'width=500,height=650,scrollbars=yes');
  }

  window.addEventListener('message', async (event) => {
    if (event.data?.type !== 'APS_TOKEN') return;
    const token = event.data.access_token;
    if (!token) { showError('Token inválido recebido.'); return; }
    sessionStorage.setItem('aps_token', token);
    loginScreen.classList.add('hidden');
    loadingOverlay.classList.add('visible');
    await startViewer(token);
  });

  async function startViewer(token) {
    try {
      loadingText.textContent = 'Inicializando viewer...';
      await new Promise((resolve) => {
        Autodesk.Viewing.Initializer(
          { env: 'AutodeskProduction2', api: 'streamingV2', getAccessToken: (cb) => cb(token, 3600) },
          resolve
        );
      });
      const viewer = new Autodesk.Viewing.GuiViewer3D(document.getElementById('forgeViewer'), { extensions: ['Autodesk.DocumentBrowser'] });
      viewer.start();
      loadingText.textContent = 'Carregando modelo .nwd...';
      await new Promise((resolve, reject) => {
        Autodesk.Viewing.Document.load('urn:' + ITEM_URN_B64,
          (doc) => {
            const viewable = doc.getRoot().getDefaultGeometry();
            if (!viewable) { reject(new Error('Nenhuma geometria encontrada no modelo.')); return; }
            viewer.loadDocumentNode(doc, viewable).then(() => {
              loadingOverlay.classList.add('fade');
              setTimeout(() => loadingOverlay.classList.remove('visible'), 500);
              resolve();
            }).catch(reject);
          },
          (code, msg) => reject(new Error(`Erro ao carregar documento (${code}): ${msg}`))
        );
      });
    } catch (err) {
      showError(err.message || 'Erro desconhecido.');
    }
  }

  const savedToken = sessionStorage.getItem('aps_token');
  if (savedToken) {
    loginScreen.classList.add('hidden');
    loadingOverlay.classList.add('visible');
    startViewer(savedToken);
  }
</script>
</body>
</html>
