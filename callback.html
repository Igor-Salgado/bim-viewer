<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Autorizando...</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #0d1117;
    color: #e6edf3;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid #30363d;
    border-top-color: #1f6feb;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  p { font-size: 13px; color: #7d8590; }
  .error { color: #f85149; font-size: 14px; text-align: center; max-width: 340px; line-height: 1.6; }
</style>
</head>
<body>

<div class="spinner" id="spinner"></div>
<p id="msg">Autorizando acesso ao modelo...</p>

<script>
  const CLIENT_ID     = 'NWd0GTdgOp5FCNcZJfqNRjo6GdnrYa4yqiwKVjGseyFS7d6t';
  const CLIENT_SECRET = '2VZbuPp2SZGbnd34bwWJB8dOcAYxiLEKZ7Xedm7jT3KmFTGYBgSWgq0lrwSP3JkD';
  const CALLBACK      = 'https://igor-salgado.github.io/bim-viewer/callback.html';

  function showError(msg) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('msg').className = 'error';
    document.getElementById('msg').textContent = msg;
  }

  async function exchangeCode() {
    const params = new URLSearchParams(window.location.search);
    const code   = params.get('code');
    const error  = params.get('error');

    if (error) { showError('Acesso negado: ' + error); return; }
    if (!code)  { showError('Código de autorização não encontrado.'); return; }

    try {
      const resp = await fetch('https://developer.api.autodesk.com/authentication/v2/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({
          grant_type:    'authorization_code',
          code:          code,
          client_id:     CLIENT_ID,
          client_secret: CLIENT_SECRET,
          redirect_uri:  CALLBACK
        })
      });

      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        showError('Erro ao obter token: ' + (err.error_description || resp.status));
        return;
      }

      const data = await resp.json();

      // Salvar token na sessão da janela pai
      if (window.opener) {
        sessionStorage.setItem('aps_token', data.access_token);
        window.opener.postMessage({ type: 'APS_TOKEN', access_token: data.access_token }, '*');
        document.getElementById('msg').textContent = 'Autorizado! Fechando...';
        setTimeout(() => window.close(), 800);
      } else {
        showError('Janela pai não encontrada. Feche e tente novamente.');
      }

    } catch (err) {
      showError('Erro de rede: ' + err.message);
    }
  }

  exchangeCode();
</script>
</body>
</html>
